<!DOCTYPE html>
<html>
<head>
  <title>MyTube Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔐 ADMIN EMAIL (must match Firebase Authentication exactly)
    const ADMIN_EMAIL = "bhuvanmambhore@email.com";

    // 🔥 FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyC6K2g9iMqZkQg8QJV1dU_dqpQXjmcqfPY",
      authDomain: "mytube-pro-8574b.firebaseapp.com",
      projectId: "mytube-pro-8574b",
      storageBucket: "mytube-pro-8574b.firebasestorage.app",
      messagingSenderId: "257345211479",
      appId: "1:257345211479:web:de0b2e790a4d4dc4642712"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let unsubscribe;

    // LOGIN
    window.login = function () {
      signInWithEmailAndPassword(auth, email.value.trim(), password.value.trim())
        .catch(err => alert(err.message));
    };

    // LOGOUT
    window.logout = function () {
      signOut(auth);
      location.reload();
    };

    // AUTH CHECK
    onAuthStateChanged(auth, user => {
      if (user && user.email === ADMIN_EMAIL) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("panel").style.display = "block";
        loadVideos();
      } else {
        document.getElementById("panel").style.display = "none";
      }
    });

    // ADD VIDEO
    window.addVideo = async function () {
      if (!videoTitle.value || !videoId.value) {
        alert("Enter title and video ID");
        return;
      }

      await addDoc(collection(db, "videos"), {
        title: videoTitle.value,
        id: videoId.value,
        created: Date.now()
      });

      videoTitle.value = "";
      videoId.value = "";
    };

    // DELETE VIDEO
    window.deleteVideo = async function (id) {
      if (confirm("Delete this video?")) {
        await deleteDoc(doc(db, "videos", id));
      }
    };

    // EDIT VIDEO
    window.editVideo = async function (id) {
      const newTitle = prompt("Enter new title:");
      if (newTitle) {
        await updateDoc(doc(db, "videos", id), {
          title: newTitle
        });
      }
    };

    // SEARCH
    window.filterVideos = function () {
      const search = searchBox.value.toLowerCase();
      document.querySelectorAll(".card").forEach(card => {
        card.style.display =
          card.innerText.toLowerCase().includes(search)
            ? "block"
            : "none";
      });
    };

    // LOAD VIDEOS
    function loadVideos() {
      if (unsubscribe) unsubscribe();

      unsubscribe = onSnapshot(collection(db, "videos"), snapshot => {
        let output = "";

        snapshot.forEach(d => {
          let v = d.data();
          output += `
            <div class="card">
              <img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg">
              <h3>${v.title}</h3>
              <div class="btns">
                <button onclick="editVideo('${d.id}')">Edit</button>
                <button onclick="deleteVideo('${d.id}')">Delete</button>
              </div>
            </div>
          `;
        });

        document.getElementById("videos").innerHTML = output;
      });
    }
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    header {
      background: #cc0000;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    input {
      padding: 8px;
      margin: 5px;
      border-radius: 4px;
      border: none;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #cc0000;
      color: white;
    }

    .card {
      background: #222;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
    }

    img {
      width: 100%;
      border-radius: 6px;
    }

    .btns {
      margin-top: 8px;
    }
  </style>
</head>

<body>

<header>👑 MyTube Admin Panel</header>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Admin Login</h2>
    <input id="email" placeholder="Admin Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="panel" style="display:none;">
    <h2>Upload Video</h2>
    <input id="videoTitle" placeholder="Video Title">
    <input id="videoId" placeholder="YouTube Video ID">
    <button onclick="addVideo()">Upload</button>

    <h2>Manage Videos</h2>
    <input id="searchBox" placeholder="Search..." oninput="filterVideos()">
    <div id="videos"></div>

    <br>
    <button onclick="logout()">Logout</button>
  </div>

</div>

</body>
</html>
