<!DOCTYPE html>
<html>
<head>
  <title>MyTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
    }

    header {
      background: #ff0000;
      color: white;
      padding: 15px;
      font-size: 22px;
      text-align: center;
    }

    .search-box {
      text-align: center;
      margin: 20px;
    }

    input {
      width: 60%;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      background: #ff0000;
      color: white;
      border: none;
      cursor: pointer;
    }

    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .video-card {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 8px;
    }

    h4 {
      margin: 10px 0;
      font-size: 16px;
    }
  </style>
</head>
<body>

<header>MyTube 🔥</header>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search in MyTube...">
  <button onclick="searchVideos()">Search</button>
</div>

<div class="videos" id="results"></div>

<script>
let videos = [
  {
    title: "First Video",
    url: "https://www.youtube.com/embed/llcI_-IB0xg"
  },
  {
    title: "Second Video",
    url: "https://www.youtube.com/embed/-JkWVF0i6Wo"
  }
];

function displayVideos(list) {
  let output = "";
  list.forEach(video => {
    output += `
      <div class="video-card">
        <h4>${video.title}</h4>
        <iframe src="${video.url}" allowfullscreen></iframe>
      </div>
    `;
  });
  document.getElementById("results").innerHTML = output;
}

function searchVideos() {
  let searchText = document.getElementById("searchInput").value.toLowerCase();
  let filtered = videos.filter(video =>
    video.title.toLowerCase().includes(searchText)
  );
  displayVideos(filtered);
}

displayVideos(videos);
</script>

</body>
</html>
