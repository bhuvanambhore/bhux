<!DOCTYPE html>
<html>
<head>
  <title>MyTube Ultra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#f9f9f9;
      display:flex;
    }

    .dark {
      background:#181818;
      color:white;
    }

    /* Sidebar */
    .sidebar {
      width:200px;
      background:#202020;
      color:white;
      padding:20px;
      height:100vh;
    }

    .sidebar h2 {
      margin-top:0;
    }

    .sidebar button {
      width:100%;
      margin:5px 0;
      padding:8px;
      border:none;
      cursor:pointer;
    }

    /* Main */
    .main {
      flex:1;
    }

    header {
      background:red;
      color:white;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .search-box {
      text-align:center;
      margin:20px;
    }

    input {
      padding:8px;
      margin:5px;
    }

    .videos {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:20px;
      padding:20px;
    }

    .video-card {
      background:white;
      border-radius:8px;
      padding:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      cursor:pointer;
    }

    .dark .video-card {
      background:#242424;
    }

    .video-card img {
      width:100%;
      border-radius:6px;
    }

    .video-card h4 {
      margin:8px 0;
    }

    .actions {
      display:flex;
      justify-content:space-between;
      font-size:14px;
    }

    #playerModal {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
    }

    #playerModal iframe {
      width:80%;
      height:60%;
    }

    .close {
      position:absolute;
      top:20px;
      right:30px;
      font-size:30px;
      color:white;
      cursor:pointer;
    }

    #loginBox {
      position:fixed;
      top:30%;
      left:40%;
      background:white;
      padding:20px;
      border-radius:8px;
      display:none;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>MyTube</h2>
  <button onclick="toggleDark()">Dark Mode</button>
  <button onclick="addVideo()">Add Video</button>
  <button onclick="showLogin()">Login</button>
</div>

<div class="main">
  <header>
    <div>🔥 MyTube Ultra</div>
    <div id="userDisplay"></div>
  </header>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search...">
    <button onclick="searchVideos()">Search</button>
  </div>

  <div class="videos" id="results"></div>
</div>

<div id="playerModal">
  <span class="close" onclick="closePlayer()">✖</span>
  <iframe id="videoPlayer" frameborder="0" allowfullscreen></iframe>
</div>

<div id="loginBox">
  <h3>Login</h3>
  <input type="text" id="username" placeholder="Enter username">
  <button onclick="login()">Login</button>
</div>

<script>
let videos = JSON.parse(localStorage.getItem("videos")) || [
  { title:"First Video", id:"llcI_-IB0xg", views:0, likes:0 },
  { title:"Second Video", id:"-JkWVF0i6Wo", views:0, likes:0 }
];

function saveVideos(){
  localStorage.setItem("videos", JSON.stringify(videos));
}

function displayVideos(list){
  let output="";
  list.forEach((video,index)=>{
    output+=`
      <div class="video-card">
        <img src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg"
             onclick="openPlayer('${video.id}',${index})">
        <h4>${video.title}</h4>
        <div class="actions">
          <span>👁 ${video.views}</span>
          <span onclick="likeVideo(${index})">👍 ${video.likes}</span>
        </div>
      </div>
    `;
  });
  document.getElementById("results").innerHTML=output;
}

function openPlayer(id,index){
  videos[index].views++;
  saveVideos();
  displayVideos(videos);
  document.getElementById("videoPlayer").src="https://www.youtube.com/embed/"+id;
  document.getElementById("playerModal").style.display="flex";
}

function closePlayer(){
  document.getElementById("playerModal").style.display="none";
  document.getElementById("videoPlayer").src="";
}

function likeVideo(index){
  videos[index].likes++;
  saveVideos();
  displayVideos(videos);
}

function searchVideos(){
  let text=document.getElementById("searchInput").value.toLowerCase();
  let filtered=videos.filter(v=>v.title.toLowerCase().includes(text));
  displayVideos(filtered);
}

function addVideo(){
  let title=prompt("Video Title:");
  let id=prompt("YouTube Video ID:");
  if(title && id){
    videos.push({title,id,views:0,likes:0});
    saveVideos();
    displayVideos(videos);
  }
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function showLogin(){
  document.getElementById("loginBox").style.display="block";
}

function login(){
  let user=document.getElementById("username").value;
  if(user){
    localStorage.setItem("user",user);
    document.getElementById("userDisplay").innerText="👤 "+user;
    document.getElementById("loginBox").style.display="none";
  }
}

window.onload=function(){
  let user=localStorage.getItem("user");
  if(user){
    document.getElementById("userDisplay").innerText="👤 "+user;
  }
  displayVideos(videos);
}
</script>

</body>
</html>
