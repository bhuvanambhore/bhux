<!DOCTYPE html>
<html>
<head>
  <title>MyTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔥 FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyC6K2g9iMqZkQg8QJV1dU_dqpQXjmcqfPY",
      authDomain: "mytube-pro-8574b.firebaseapp.com",
      projectId: "mytube-pro-8574b",
      storageBucket: "mytube-pro-8574b.firebasestorage.app",
      messagingSenderId: "257345211479",
      appId: "1:257345211479:web:de0b2e790a4d4dc4642712"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function loadVideos() {
      onSnapshot(collection(db, "videos"), snapshot => {
        let output = "";
        snapshot.forEach(doc => {
          const video = doc.data();
          output += `
            <div class="card">
              <img src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg">
              <h3>${video.title}</h3>
              <iframe width="100%" height="200"
                src="https://www.youtube.com/embed/${video.id}"
                frameborder="0" allowfullscreen>
              </iframe>
            </div>
          `;
        });
        document.getElementById("videos").innerHTML = output;
      });
    }

    window.onload = loadVideos;
  </script>

  <style>
    body { margin:0; font-family:Arial; background:#f4f4f4; }
    header { background:red; color:white; padding:15px; text-align:center; }
    .videos { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; padding:20px; }
    .card { background:white; padding:10px; border-radius:8px; }
    img { width:100%; border-radius:6px; }
  </style>
</head>
<body>

<header>🔥 MyTube</header>
<div class="videos" id="videos"></div>

</body>
</html>
