<!DOCTYPE html>
<html>
<head>
  <title>MyTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔥 FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyC6K2g9iMqZkQg8QJV1dU_dqpQXjmcqfPY",
      authDomain: "mytube-pro-8574b.firebaseapp.com",
      projectId: "mytube-pro-8574b",
      storageBucket: "mytube-pro-8574b.firebasestorage.app",
      messagingSenderId: "257345211479",
      appId: "1:257345211479:web:de0b2e790a4d4dc4642712"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function loadVideos() {
      const q = query(collection(db, "videos"), orderBy("created", "desc"));

      onSnapshot(q, snapshot => {

        if (snapshot.empty) {
          document.getElementById("videos").innerHTML =
            "<h2 style='text-align:center;'>No videos uploaded yet</h2>";
          return;
        }

        let output = "";

        snapshot.forEach(doc => {
          const video = doc.data();

          output += `
            <div class="card">
              <img src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg">
              <h3>${video.title}</h3>
              <iframe 
                src="https://www.youtube.com/embed/${video.id}" 
                frameborder="0" 
                allowfullscreen>
              </iframe>
            </div>
          `;
        });

        document.getElementById("videos").innerHTML = output;
      });
    }

    window.onload = loadVideos;
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
    }

    header {
      background: #cc0000;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 6px;
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 6px;
      margin-top: 8px;
    }

    h3 {
      margin: 8px 0;
      font-size: 16px;
    }
  </style>
</head>

<body>

<header>🔥 MyTube</header>

<div class="videos" id="videos">
  <h2 style="text-align:center;">Loading videos...</h2>
</div>

</body>
</html>
